<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetAI Pro - AI宠物行为识别</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        header p {
            font-size: 1.3em;
            opacity: 0.9;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px 0;
        }
        .feature-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .feature-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .feature-card p {
            color: #666;
        }
        .download {
            text-align: center;
            padding: 60px 20px;
        }
        .download a {
            display: inline-block;
            background: #000;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        .download a:hover {
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            padding: 40px;
            color: white;
            opacity: 0.8;
        }
        footer a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>PetAI Pro</h1>
            <p>AI宠物行为识别，懂你的宠物助手</p>
        </header>

        <div class="features">
            <div class="feature-card">
                <h3>声音识别</h3>
                <p>实时分析宠物叫声，了解情绪状态。支持猫狗多种声音类型识别。</p>
            </div>
            <div class="feature-card">
                <h3>拍照分析</h3>
                <p>AI识别宠物表情和行为姿态，分析情绪状态。</p>
            </div>
            <div class="feature-card">
                <h3>智能对话</h3>
                <p>与宠物进行趣味互动，翻译宠物语言。</p>
            </div>
            <div class="feature-card">
                <h3>隐私保护</h3>
                <p>所有数据处理均在本地完成，不上传云端。</p>
            </div>
        </div>

        <div class="download">
            <a href="#">App Store 下载</a>
        </div>

        <footer>
            <p>
                <a href="privacy.html">隐私政策</a>
                <a href="terms.html">服务条款</a>
                <a href="support.html">技术支持</a>
            </p>
            <p style="margin-top: 20px;">© 2025 PetAI Pro. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
